<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sipariş Formu Tasarımcısı</title>
    <style>
        :root { --primary: #e63946; --dark: #1d3557; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .designer-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .section-card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 25px; background: #fff; }
        .field-row { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; align-items: center; margin-bottom: 10px; }
        .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px; background: #fff; border-radius: 8px; border: 1px dashed #cbd5e1; }
        label { display: block; font-size: 11px; font-weight: bold; color: #475569; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
        .btn-add { background: var(--dark); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: 600; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 20px; box-shadow: 0 5px 15px rgba(230,57,70,0.4); }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; width: 35px; height: 35px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        textarea { height: 60px; resize: vertical; }
    </style>
</head>
<body>

<div class="designer-container">
    <h2 style="color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px;">⚙️ Form Yapılandırması</h2>
    
    <div class="section-card">
        <h3>1. Üst Bilgi Alanları (Müşteri Bilgileri)</h3>
        <div id="header-fields"></div>
        <button class="btn-add" onclick="alanEkle('header')">+ Yeni Üst Alan Ekle</button>
    </div>

    <div class="section-card">
        <h3>2. Tablo Sütunları ve Stilleri</h3>
        <div id="table-fields"></div>
        <button class="btn-add" onclick="alanEkle('table')">+ Yeni Sütun Ekle</button>
    </div>

    <button class="btn-save" onclick="tasarimiKaydet()">YAPILANDIRMAYI KAYDET</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDO7123Lo08OrESb9Fg5xO3XK25VPNnN0w",
        authDomain: "teklifverme-b4a4d.firebaseapp.com",
        projectId: "teklifverme-b4a4d",
        databaseURL: "https://teklifverme-b4a4d-default-rtdb.firebaseio.com",
        appId: "1:36396750279:web:94e26c312a0b89825335e2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.alanEkle = function(target, data = null) {
        const container = document.getElementById(target + '-fields');
        const id = Date.now() + Math.floor(Math.random() * 100);
        const div = document.createElement('div');
        div.className = 'field-row';
        
        const dName = data ? data.name : '';
        const dWidth = data ? data.width : (target === 'header' ? '50%' : '150');
        const dStyle = data?.style || { color: '#000000', fontSize: '13px', textAlign: 'left' };

        div.innerHTML = `
            <div class="row-grid">
                <div><label>Başlık / Ad</label><input type="text" class="f-name" value="${dName}"></div>
                <div><label>Genişlik (${target==='header'?'%':'px'})</label><input type="text" class="f-width" value="${dWidth.replace('px','').replace('%','')}"></div>
                <div><label>Tip</label>
                    <select class="f-type" onchange="toggleList(this, ${id})">
                        <option value="text" ${data?.type==='text'?'selected':''}>Yazı</option>
                        <option value="number" ${data?.type==='number'?'selected':''}>Sayı</option>
                        <option value="list" ${data?.type==='list'?'selected':''}>Liste</option>
                    </select>
                </div>
                <button class="btn-del" onclick="this.parentElement.parentElement.remove()">X</button>
            </div>
            <div class="style-grid">
                <div><label>Renk</label><input type="color" class="s-color" value="${dStyle.color}"></div>
                <div><label>Boyut (px)</label><input type="number" class="s-size" value="${dStyle.fontSize.replace('px','')}"></div>
                <div><label>Hizalama</label>
                    <select class="s-align">
                        <option value="left" ${dStyle.textAlign==='left'?'selected':''}>Sol</option>
                        <option value="center" ${dStyle.textAlign==='center'?'selected':''}>Orta</option>
                        <option value="right" ${dStyle.textAlign==='right'?'selected':''}>Sağ</option>
                    </select>
                </div>
            </div>
            <div id="opt-area-${id}" style="display: ${data?.type==='list'?'block':'none'}; margin-top:10px;">
                <label>Liste Öğeleri (Her satıra bir tane)</label>
                <textarea class="f-options">${data?.options ? data.options.join('\n') : ''}</textarea>
            </div>
        `;
        container.appendChild(div);
    }

    window.toggleList = (sel, id) => document.getElementById('opt-area-'+id).style.display = sel.value === 'list' ? 'block' : 'none';

    window.tasarimiKaydet = function() {
        const process = (selector, isHeader) => {
            return Array.from(document.querySelectorAll(selector)).map(el => ({
                name: el.querySelector('.f-name').value,
                width: el.querySelector('.f-width').value + (isHeader ? '%' : 'px'),
                type: el.querySelector('.f-type').value,
                options: el.querySelector('.f-options')?.value.split('\n').filter(x => x.trim()) || [],
                style: {
                    color: el.querySelector('.s-color').value,
                    fontSize: el.querySelector('.s-size').value + 'px',
                    textAlign: el.querySelector('.s-align').value
                }
            }));
        };

        const config = { header: process('#header-fields .field-row', true), table: process('#table-fields .field-row', false) };
        set(ref(db, 'form_tasarimi'), config).then(() => alert("Tasarım Kaydedildi!"));
    }

    onValue(ref(db, 'form_tasarimi'), (s) => {
        const d = s.val();
        if(d) {
            document.getElementById('header-fields').innerHTML = "";
            document.getElementById('table-fields').innerHTML = "";
            d.header?.forEach(h => alanEkle('header', h));
            d.table?.forEach(t => alanEkle('table', t));
        }
    }, {onlyOnce: true});
</script>
</body>
</html>
