<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İmalat ve Sipariş Sorgulama</title>
    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f1f5f9; --border: #cbd5e1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        
        .search-container { 
            max-width: 900px; 
            margin: 0 auto 30px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .search-container input { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            outline: none; 
            font-size: 15px;
        }
        .btn-search { background: var(--p); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Sonuç Kağıdı */
        .paper { 
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            margin: 0 auto; 
            padding: 15mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            display: none;
            position: relative;
        }
        
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .header h2 { margin: 0; color: var(--p); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 13px; }
        th { background: #f8fafc; }

        /* Bilgi Paneli (Maliyet ve Toplam) */
        .summary-box {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        .summary-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            padding: 5px;
        }
        .summary-item b { min-width: 120px; display: inline-block; }
        
        /* Gizleme Kontrolü */
        .hide-control {
            cursor: pointer;
            font-size: 12px;
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
            user-select: none;
        }
        .hide-control:hover { background: #ddd; }
        
        /* Yazdırma Esnasında Gizleme */
        .hidden-on-print { display: none !important; }

        .no-result { text-align: center; color: #64748b; margin-top: 50px; }

        @media print {
            body { background: white; padding: 0; }
            .search-container, .btn-print, .hide-control { display: none !important; }
            .paper { box-shadow: none; width: 100%; margin: 0; display: block !important; }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Müşteri Adı veya Form No yazın...">
        <button class="btn-search" onclick="sorgula()">🔍 SİPARİŞİ BUL</button>
        <button class="btn-print" style="background:#64748b; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;" onclick="window.print()">🖨 YAZDIR</button>
    </div>

    <div id="result-area">
        <div class="no-result" id="msg">Arama yapmak için yukarıdaki kutuyu kullanın.</div>
        
        <div class="paper" id="order-paper">
            <div class="header">
                <div>
                    <h2 id="res-customer">MÜŞTERİ ADI</h2>
                    <small>İMALAT VE ÜRETİM FORMU</small>
                </div>
                <div style="text-align: right;">
                    <b id="res-no">FORM NO: -</b><br>
                    <span id="res-date">TARİH: -</span>
                </div>
            </div>

            <table id="res-table">
                <thead><tr id="res-thead"></tr></thead>
                <tbody id="res-tbody"></tbody>
            </table>

            <div class="summary-box">
                <div class="summary-item" id="cost-row">
                    <span class="hide-control" onclick="toggleVisibility('cost-row')">👁 Göster/Gizle</span>
                    <b>İmalat Maliyeti:</b>
                    <span id="res-cost" style="color: #e11d48;">-</span>
                </div>
                <div class="summary-item" id="total-row">
                    <span class="hide-control" onclick="toggleVisibility('total-row')">👁 Göster/Gizle</span>
                    <b>Genel Toplam:</b>
                    <span id="res-total" style="font-weight: bold; color: #16a34a;">-</span>
                </div>
            </div>
            
            <div style="margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 10px;">
                <b>NOTLAR:</b>
                <p style="height: 100px; border: 1px solid #eee; margin-top: 5px;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO7123Lo08OrESb9Fg5xO3XK25VPNnN0w",
            authDomain: "teklifverme-b4a4d.firebaseapp.com",
            projectId: "teklifverme-b4a4d",
            databaseURL: "https://teklifverme-b4a4d-default-rtdb.firebaseio.com",
            appId: "1:36396750279:web:94e26c312a0b89825335e2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Gizleme fonksiyonunu globale bağla
        window.toggleVisibility = (rowId) => {
            const row = document.getElementById(rowId);
            row.classList.toggle('hidden-on-print');
        };

        window.sorgula = async () => {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if(!query) return alert("Lütfen arama terimi girin.");

            const msg = document.getElementById('msg');
            const paper = document.getElementById('order-paper');
            
            try {
                const snapshot = await get(child(ref(db), 'arsiv'));
                if (!snapshot.exists()) {
                    msg.innerText = "Sistemde hiç kayıtlı sipariş bulunamadı.";
                    return;
                }

                const data = snapshot.val();
                let foundOrder = null;

                // Arama
                Object.values(data).forEach(order => {
                    if (order.no.toLowerCase().includes(query) || (order.customer && order.customer.toLowerCase().includes(query))) {
                        foundOrder = order;
                    }
                });

                if (foundOrder) {
                    displayOrder(foundOrder);
                    msg.style.display = 'none';
                    paper.style.display = 'block';
                } else {
                    msg.innerText = "Eşleşen sipariş bulunamadı.";
                    paper.style.display = 'none';
                }

            } catch (error) {
                console.error(error);
                alert("Veri çekme hatası!");
            }
        };

        async function displayOrder(order) {
            document.getElementById('res-customer').innerText = order.customer || "SİPARİŞ DETAYI";
            document.getElementById('res-no').innerText = "FORM NO: " + order.no;
            document.getElementById('res-date').innerText = "TARİH: " + order.tarih;
            
            // Maliyet ve Toplam Verileri (Yeni eklenen kısımlar)
            document.getElementById('res-cost').innerText = order.toplamMaliyet || "0.00 TL";
            document.getElementById('res-total').innerText = order.toplamSatis || "0.00 TL";

            const designSnap = await get(child(ref(db), 'form_tasarimi'));
            const config = designSnap.val();

            if(config && order.items) {
                const thead = document.getElementById('res-thead');
                thead.innerHTML = `<th>NO</th>` + config.table.map(t => `<th>${t.name}</th>`).join('');

                const tbody = document.getElementById('res-tbody');
                tbody.innerHTML = order.items.map((row, idx) => `
                    <tr>
                        <td>${idx + 1}</td>
                        ${row.map(cell => `<td>${cell || '-'}</td>`).join('')}
                    </tr>
                `).join('');
            } else {
                document.getElementById('res-tbody').innerHTML = "<tr><td colspan='100%'>Ürün detayı bulunamadı.</td></tr>";
            }
        }
    </script>
</body>
</html>
