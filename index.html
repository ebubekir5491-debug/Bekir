<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md w-full space-y-8 bg-slate-800/50 p-8 rounded-3xl backdrop-blur-xl border border-slate-700 shadow-2xl">
        
        <div class="text-center">
            <div class="inline-flex p-4 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/50 mb-4">
                <i class="fas fa- joys-window text-white text-3xl"></i>
                <span class="text-3xl">🪟</span>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">ADA SİNEKLİK</h1>
            <p class="text-slate-400 text-sm mt-2 uppercase tracking-widest font-bold">Yönetim Paneli</p>
        </div>

        <div class="space-y-4">
            
            <a href="Siparis.html" class="menu-card flex items-center justify-between p-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-white group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-indigo-400/30 rounded-xl flex items-center justify-center">
                        <i class="fas fa-file-invoice"></i>
                    </div>
                    <span class="font-bold tracking-wide">Sipariş Al</span>
                </div>
                <i class="fas fa-chevron-right text-indigo-300 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <a href="Kesim.html" class="menu-card flex items-center justify-between p-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-white group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-emerald-400/30 rounded-xl flex items-center justify-center">
                        <i class="fas fa-cut"></i>
                    </div>
                    <span class="font-bold tracking-wide">İmalat Listesi Oluştur</span>
                </div>
                <i class="fas fa-chevron-right text-emerald-300 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <div class="border-t border-slate-700 my-6 pt-6">
                <p class="text-[10px] text-slate-500 font-black mb-4 tracking-[0.2em] uppercase">Güvenli Alan (Şifreli)</p>
                
                <div class="grid gap-3">
                    <button onclick="protectedLink('Kesimayarlar.html')" class="menu-card flex items-center justify-between p-4 bg-slate-700 hover:bg-slate-600 rounded-2xl text-slate-200 group border border-slate-600">
                        <div class="flex items-center gap-4">
                            <i class="fas fa-cog text-indigo-400"></i>
                            <span class="font-bold text-sm">İmalat Ayarları</span>
                        </div>
                        <i class="fas fa-lock text-slate-500 text-xs"></i>
                    </button>

                    <button onclick="protectedLink('maliyethesaplama.html')" class="menu-card flex items-center justify-between p-4 bg-slate-700 hover:bg-slate-600 rounded-2xl text-slate-200 group border border-slate-600">
                        <div class="flex items-center gap-4">
                            <i class="fas fa-calculator text-emerald-400"></i>
                            <span class="font-bold text-sm">Maliyet Ayarları</span>
                        </div>
                        <i class="fas fa-lock text-slate-500 text-xs"></i>
                    </button>

                    <button onclick="protectedLink('ayarlar.html')" class="menu-card flex items-center justify-between p-4 bg-slate-700 hover:bg-slate-600 rounded-2xl text-slate-200 group border border-slate-600">
                        <div class="flex items-center gap-4">
                            <i class="fas fa-layer-group text-amber-400"></i>
                            <span class="font-bold text-sm">Sayfa Düzeni</span>
                        </div>
                        <i class="fas fa-lock text-slate-500 text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-600 text-[10px] font-medium uppercase tracking-widest">
            © 2026 Ada Sineklik Sistemleri
        </p>
    </div>

    <script>
        function protectedLink(target) {
            const pass = prompt("Bu alana erişmek için şifre giriniz:");
            
            if (pass === "7556") {
                window.location.href = target;
            } else if (pass !== null) {
                alert("Hatalı şifre! Giriş engellendi.");
            }
        }
    </script>
</body>
</html>
