<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sipariş Formu ve Maliyet Takibi</title>
    <style>
        :root { --border: #000; --panel-bg: #1e293b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        #cost-panel {
            position: fixed;
            right: 20px;
            top: 20px;
            width: 240px;
            background: var(--panel-bg);
            color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            font-size: 12px;
            z-index: 1000;
            border: 1px solid #334155;
        }
        #cost-panel h3 { margin-top: 0; font-size: 14px; border-bottom: 1px solid #475569; padding-bottom: 8px; color: #38bdf8; }
        .cost-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #334155; }
        .cost-total-box { margin-top: 10px; padding-top: 10px; font-weight: bold; color: #10b981; font-size: 15px; border-top: 2px solid #475569; }
        .cost-error { color: #f87171; font-size: 10px; padding: 2px 0; }

        .paper { width: 210mm; min-height: 297mm; background: white; padding: 15mm; box-shadow: 0 0 10px rgba(0,0,0,0.5); box-sizing: border-box; position: relative; }
        #order-no-box { position: absolute; top: 10mm; right: 15mm; font-size: 11px; color: #555; text-align: right; }
        .header-title { text-align: center; font-weight: bold; font-size: 18px; margin: 25px 0; border-bottom: 2px solid var(--border); padding-bottom: 5px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); margin-bottom: 10px; }
        .info-item { border: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 5px; }
        .info-item label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .info-item input { border: none; outline: none; font-size: 13px; background: transparent; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: #f2f2f2; border: 1px solid var(--border); padding: 8px; font-size: 11px; }
        td { border: 1px solid var(--border); padding: 0; overflow: hidden; }
        
        .cell-input { width: 100%; border: none; outline: none; padding: 8px; box-sizing: border-box; background: transparent; display: block; }
        
        .footer-container { display: flex; justify-content: flex-end; margin-top: 15px; }
        .total-wrapper { border: 2px solid var(--border); display: flex; width: 250px; }
        .total-lbl { background: #eee; padding: 12px; font-weight: bold; font-size: 13px; border-right: 2px solid var(--border); flex: 1; }
        .total-inp { width: 130px; border: none; outline: none; padding: 12px; font-size: 16px; font-weight: bold; text-align: right; }

        .action-bar { margin-bottom: 15px; display: flex; gap: 10px; width: 210mm; justify-content: flex-start; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-decoration: none; font-size: 14px; }
        .btn-save { background: #10b981; }
        .btn-settings { background: #2563eb; }
        .btn-maliyet { background: #f59e0b; }

        @media print { 
            body { background: white; padding: 0; } 
            .paper { box-shadow: none; width: 100%; margin: 0; } 
            .action-bar, #cost-panel { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="action-bar">
        <a href="Ayarlar.html" class="btn btn-settings">⚙ TASARIMI DÜZENLE</a>
        <a href="maliyet.html" class="btn btn-maliyet">💰 MALİYET AYARLARI</a>
        <button class="btn btn-save" onclick="kaydetVeGonder()">✅ KAYDET VE GÖNDER</button>
    </div>

    <div id="cost-panel">
        <h3>📊 Maliyet Analizi</h3>
        <div id="cost-items-list"></div>
        <div class="cost-total-box">
            Toplam Maliyet: <span id="total-cost-val">0.00 TL</span>
        </div>
    </div>

    <div class="paper" id="print-area">
        <div id="order-no-box">
            <b>FORM NO:</b> <span id="display-no">TASLAK</span><br>
            <b>TARİH:</b> <span id="display-date">-</span>
        </div>

        <div class="header-title">MÜŞTERİ TEKLİF VE SİPARİŞ FORMU</div>
        <div id="customer-info" class="info-grid"></div>

        <table>
            <thead id="theader"></thead>
            <tbody id="tbody"></tbody>
        </table>

        <div class="footer-container">
            <div class="total-wrapper">
                <div class="total-lbl">GENEL TOPLAM</div>
                <input type="text" id="grand-total" class="total-inp" placeholder="0.00 TL">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO7123Lo08OrESb9Fg5xO3XK25VPNnN0w",
            authDomain: "teklifverme-b4a4d.firebaseapp.com",
            projectId: "teklifverme-b4a4d",
            databaseURL: "https://teklifverme-b4a4d-default-rtdb.firebaseio.com",
            appId: "1:36396750279:web:94e26c312a0b89825335e2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let config = null;
        let maliyetConfig = null;
        let tabloVerileri = null;

        // Açılışta geçici verileri temizle
        remove(ref(db, 'tablo_verileri'));

        onValue(ref(db, 'form_tasarimi'), (s) => {
            config = s.val();
            if(config) renderHeader();
        });

        onValue(ref(db, 'maliyet_ayarlari'), (s) => {
            maliyetConfig = s.val();
            if(tabloVerileri) hesaplaHepsini();
        });

        function renderHeader() {
            document.getElementById('customer-info').innerHTML = config.header.map(h => `
                <div class="info-item" style="grid-column: ${h.width === '100%' ? 'span 2' : 'span 1'}">
                    <label>${h.name}</label><input type="text" class="header-input">
                </div>`).join('');
            document.getElementById('theader').innerHTML = `<tr><th style="width:40px">NO</th>${config.table.map(t => `<th style="width:${t.width}">${t.name}</th>`).join('')}</tr>`;
            dinle();
        }

        function dinle() {
            onValue(ref(db, 'tablo_verileri'), (snapshot) => {
                tabloVerileri = snapshot.val();
                const tb = document.getElementById('tbody');
                tb.innerHTML = "";
                
                if(tabloVerileri) {
                    Object.keys(tabloVerileri).forEach((id, idx) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td style="text-align:center; font-size:11px">${idx+1}</td>`;
                        
                        config.table.forEach((col, i) => {
                            const td = document.createElement('td');
                            let el;
                            if(col.type === 'list') {
                                el = document.createElement('select');
                                el.innerHTML = `<option value=""></option>` + col.options.map(o => `<option value="${o}" ${tabloVerileri[id][i]===o?'selected':''}>${o}</option>`).join('');
                            } else {
                                el = document.createElement('input');
                                el.value = tabloVerileri[id][i] || "";
                            }
                            el.className = 'cell-input';
                            
                            el.onchange = () => {
                                let row = tabloVerileri[id]; row[i] = el.value;
                                set(ref(db, 'tablo_verileri/'+id), row);
                                if(idx === Object.keys(tabloVerileri).length - 1 && el.value !== "") yeni();
                            };
                            td.appendChild(el);
                            tr.appendChild(td);
                        });
                        tb.appendChild(tr);
                    });
                    hesaplaHepsini();
                } else { yeni(); }
            });
        }

        function hesaplaHepsini() {
            if(!maliyetConfig || !tabloVerileri || !config) return;
            const panel = document.getElementById('cost-items-list');
            panel.innerHTML = "";
            let toplamMaliyetGenel = 0;

            Object.keys(tabloVerileri).forEach((id, idx) => {
                const row = tabloVerileri[id];
                const urunIdx = config.table.findIndex(c => c.name.toLowerCase().includes('ürün') || c.name.toLowerCase().includes('model'));
                const urunAdi = row[urunIdx];
                if(!urunAdi) return;

                const ilgiliFormuller = maliyetConfig.formulas?.filter(f => f.product === urunAdi) || [];
                let satirMaliyeti = 0;
                let hataVar = false;

                ilgiliFormuller.forEach(fObj => {
                    let fStr = fObj.logic;
                    const hamMadde = maliyetConfig.materials?.find(m => m.name === fObj.selectedMaterial);
                    const hamFiyatCM = hamMadde ? (parseFloat(hamMadde.price) / 100) : 0;
                    fStr = fStr.split('[HamFiyat]').join(hamFiyatCM);

                    config.table.forEach((col, i) => {
                        let cellVal = String(row[i]).replace(',', '.');
                        let val = parseFloat(cellVal) || 0;
                        fStr = fStr.split(`[${col.name}]`).join(val);
                    });

                    try {
                        const sonuc = Function('"use strict";return (' + fStr + ')')();
                        if(!isNaN(sonuc)) satirMaliyeti += sonuc;
                    } catch(e) { hataVar = true; }
                });

                if(satirMaliyeti > 0) {
                    toplamMaliyetGenel += satirMaliyeti;
                    panel.innerHTML += `<div class="cost-item"><span>Satır ${idx+1}:</span> <b>${satirMaliyeti.toFixed(2)} TL</b></div>`;
                } else if(hataVar) {
                    panel.innerHTML += `<div class="cost-error">Satır ${idx+1}: Formül Hatası!</div>`;
                }
            });
            document.getElementById('total-cost-val').innerText = toplamMaliyetGenel.toFixed(2) + " TL";
        }

        function yeni() { push(ref(db, 'tablo_verileri'), config.table.map(() => "")); }

        // SIRALI FORM NUMARASI VE TAM KAYIT (MALİYET + GENEL TOPLAM DAHİL)
        window.kaydetVeGonder = async () => {
            try {
                // 1. Firebase'den Sıradaki Numarayı Al (00001 formatı)
                const noRef = ref(db, 'son_form_no');
                let yeniNoStr = "";
                
                await runTransaction(noRef, (currentValue) => {
                    const nextVal = (currentValue || 0) + 1;
                    yeniNoStr = nextVal.toString().padStart(5, '0');
                    return nextVal;
                });

                const tarih = new Date().toLocaleDateString('tr-TR');
                
                // 2. Müşteri Bilgilerini Topla
                const headerDetails = Array.from(document.querySelectorAll('.header-input')).map(inp => ({
                    label: inp.parentElement.querySelector('label').innerText,
                    value: inp.value
                }));
                const customerName = headerDetails[0]?.value || "İsimsiz";

                // 3. Tablo Verilerini Filtrele
                const items = Object.values(tabloVerileri || {}).filter(row => row.some(cell => cell && cell.trim() !== ""));

                if(items.length === 0) {
                    alert("Lütfen en az bir ürün giriniz!");
                    return;
                }

                // 4. Maliyet ve Satış Bilgileri
                const imalatMaliyeti = document.getElementById('total-cost-val').innerText;
                const satisFiyati = document.getElementById('grand-total').value || "0.00 TL";

                const archiveData = {
                    no: yeniNoStr,
                    tarih: tarih,
                    customer: customerName,
                    headerDetails: headerDetails,
                    items: items,
                    toplamSatis: satisFiyati,      // Teklif Edilen Fiyat
                    toplamMaliyet: imalatMaliyeti,  // İmalat Maliyeti
                    timestamp: new Date().getTime()
                };

                // Form No ve Tarihi ekrana bas (yazdırma için)
                document.getElementById('display-no').innerText = yeniNoStr;
                document.getElementById('display-date').innerText = tarih;

                // 5. Arşive Kaydet
                await set(ref(db, 'arsiv/' + yeniNoStr), archiveData);
                
                alert("Sipariş Arşivlendi: No " + yeniNoStr);
                window.print();

                // 6. Sıfırla ve Temizle
                await remove(ref(db, 'tablo_verileri'));
                location.reload(); 

            } catch (err) {
                console.error(err);
                alert("Hata oluştu: " + err.message);
            }
        };
    </script>
</body>
</html>
