<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik | Akıllı Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @media print { .no-print { display: none !important; } }
        #order-form { width: 210mm; min-height: 297mm; margin: auto; background: white; padding: 10mm; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; padding: 6px; word-wrap: break-word; font-size: 13px; }
        input, select { border: none !important; outline: none !important; background: transparent; width: 100%; font-family: inherit; }
        
        /* Asistan Efektleri */
        .ai-pulse { animation: pulse-red 1.5s infinite; box-shadow: 0 0 25px rgba(220, 38, 38, 0.8); }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .voice-active { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; transition: all 0.3s; }
        
        #cost-sidebar { position: fixed; right: 20px; top: 100px; width: 280px; z-index: 50; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-panel { transform: translateX(350px); }
    </style>
</head>
<body class="bg-slate-100 p-4 pb-28">

    <div id="cost-sidebar" class="no-print hidden-panel bg-slate-900 text-white p-5 rounded-2xl shadow-2xl border-l-4 border-red-600">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-black text-red-500 tracking-widest uppercase">💰 CANLI ANALİZ</h2>
            <button onclick="toggleCostPanel()" class="text-slate-400 hover:text-white">×</button>
        </div>
        <div id="row-costs" class="space-y-2 max-h-[300px] overflow-y-auto mb-4 pr-2 text-[11px] font-mono"></div>
        <div class="border-t border-slate-700 pt-4">
            <p class="text-[10px] text-slate-400 uppercase">Toplam Tahmini Maliyet</p>
            <p id="total-cost-display" class="text-3xl font-black text-emerald-400">0.00 TL</p>
        </div>
    </div>

    <div class="fixed bottom-8 right-8 z-[100] no-print">
        <button id="ai-trigger" onclick="toggleSmartAssistant()" class="bg-red-600 text-white w-20 h-20 rounded-full shadow-[0_10px_40px_rgba(220,38,38,0.5)] flex flex-col items-center justify-center hover:scale-110 transition-all border-4 border-white">
            <i class="fas fa-microphone-alt text-2xl mb-1"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">SİSTEMİ YÖNET</span>
        </button>
    </div>

    <div class="max-w-6xl mx-auto mb-6 no-print flex flex-wrap gap-3 items-center bg-white p-4 rounded-2xl shadow-sm border-b-4 border-indigo-600">
        <div class="flex flex-1 gap-2">
            <button onclick="saveAndDownload()" class="bg-indigo-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">PDF OLUŞTUR</button>
            <button onclick="saveAndShareWhatsApp()" class="bg-green-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-green-700">WHATSAPP</button>
            <button onclick="addRow()" class="bg-slate-800 text-white px-5 py-3 rounded-xl font-bold">+ SATIR EKLE</button>
        </div>
        <div class="flex gap-2 bg-slate-100 p-2 rounded-xl">
            <input type="number" id="search-order-no" class="w-24 bg-transparent font-bold text-center" placeholder="Sipariş No">
            <button onclick="fetchOrder()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">BUL</button>
        </div>
    </div>

    <div id="order-form" class="shadow-2xl relative">
        <div id="edit-mode-badge" class="hidden no-print absolute -top-3 -left-3 bg-yellow-400 text-black text-[11px] font-black px-4 py-1 rounded-full border-2 border-black animate-bounce">DÜZENLEME MODU AKTİF</div>

        <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-6">
            <div>
                <h1 id="dynamic-title" class="text-4xl font-black uppercase text-indigo-900 tracking-tighter">YÜKLENİYOR...</h1>
                <p class="text-xs font-bold text-slate-500 italic mt-1">Sipariş Kayıt Tarihi: <span id="current-date">--.--.----</span></p>
            </div>
            <div class="text-right border-l-4 border-red-600 pl-4">
                <p class="text-[10px] font-black text-slate-400 uppercase">FORM NUMARASI</p>
                <p id="form-number" class="text-4xl font-mono font-black text-red-600 tracking-widest">00000</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8 p-4 bg-slate-50 border border-slate-200 rounded-2xl">
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-600 uppercase">MÜŞTERİ ADI:</span>
                <input type="text" id="customer-name" oninput="saveDraft()" class="border-b-2 border-slate-300 font-bold text-lg focus:border-indigo-600 transition-all" placeholder="...">
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-600 uppercase">TELEFON:</span>
                <input type="text" id="customer-phone" oninput="saveDraft()" class="border-b-2 border-slate-300 font-bold text-lg focus:border-indigo-600 transition-all" placeholder="05__ ___ __ __">
            </div>
        </div>

        <table>
            <thead id="table-head" class="bg-slate-100 font-bold uppercase"></thead>
            <tbody id="table-body"></tbody>
        </table>

        <div class="mt-8 flex justify-end">
            <div class="w-1/2 border-4 border-black p-4 rounded-xl flex items-center justify-between bg-slate-50">
                <span class="text-lg font-black uppercase tracking-tighter">GENEL TOPLAM SATIŞ:</span>
                <div class="flex items-center gap-2">
                    <input type="text" id="grand-total-sale" oninput="saveDraft()" class="text-right text-3xl font-black text-red-700 w-32" placeholder="0.00">
                    <span class="font-black text-2xl text-red-700">TL</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, query, limitToLast, orderByKey } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVUGH6f9XgwY2Izi2PG0mUW_2hoUW_Ywc",
            authDomain: "adasineklik54-4c11c.firebaseapp.com",
            databaseURL: "https://adasineklik54-4c11c-default-rtdb.firebaseio.com",
            projectId: "adasineklik54-4c11c",
            storageBucket: "adasineklik54-4c11c.firebasestorage.app",
            messagingSenderId: "416407042534",
            appId: "1:416407042534:web:8105a2ac5f87477eff7e27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let config = null;
        let recipes = [];
        let isEditMode = false;
        let isAILending = false;

        // --- ASİSTAN AYARLARI ---
        const recognition = (window.SpeechRecognition || window.webkitSpeechRecognition) ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(recognition) {
            recognition.lang = 'tr-TR';
            recognition.continuous = false;
            recognition.interimResults = false;
        }

        async function speak(text) {
            return new Promise(resolve => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'tr-TR';
                utter.pitch = 0.85; // Hafif kalın, tok bir ses
                utter.rate = 1.05;
                utter.onend = resolve;
                window.speechSynthesis.speak(utter);
            });
        }

        function playBeep() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        // --- MERKEZİ ASİSTAN ZEKA (KOMUT ANALİZİ) ---
        window.toggleSmartAssistant = async function() {
            if(isAILending) return;
            isAILending = true;
            document.getElementById('ai-trigger').classList.add('ai-pulse');
            
            await speak("Seni dinliyorum patron. Ne yapmamı istersin?");
            playBeep();
            recognition.start();

            recognition.onresult = async (event) => {
                const command = event.results[0][0].transcript.toLowerCase();
                console.log("Gelen Komut:", command);
                await processCommand(command);
            };

            recognition.onerror = () => stopAI();
        }

        async function processCommand(cmd) {
            // 1. PDF Komutları
            if(cmd.includes("pdf") || cmd.includes("kaydet") || cmd.includes("dosya yap")) {
                await speak("Hemen PDF dosyasını hazırlayıp kaydediyorum.");
                saveAndDownload();
                return;
            }

            // 2. WhatsApp Komutları
            if(cmd.includes("whatsapp") || cmd.includes("paylaş") || cmd.includes("gönder")) {
                await speak("Siparişi WhatsApp üzerinden paylaşman için hazırlıyorum.");
                saveAndShareWhatsApp();
                return;
            }

            // 3. Sipariş Bulma
            if(cmd.includes("bul") || cmd.includes("getir") || cmd.includes("nolu")) {
                let num = cmd.replace(/[^0-9]/g, '');
                if(num) {
                    document.getElementById('search-order-no').value = num;
                    await speak(num + " numaralı siparişi arayıp buluyorum.");
                    fetchOrder();
                } else {
                    await speak("Hangi numaralı siparişi aramamı istersin patron?");
                    recognition.start();
                }
                return;
            }

            // 4. Maliyet Kontrolü
            if(cmd.includes("maliyet") || cmd.includes("kaç para") || cmd.includes("kar")) {
                toggleCostPanel();
                const total = document.getElementById('total-cost-display').innerText;
                await speak("Hemen bakalım. Şu anki toplam maliyetimiz " + total + " patron. Bereketli olsun!");
                stopAI();
                return;
            }

            // 5. Veri Girişi (Spesifik satır)
            if(cmd.includes("satır") || cmd.includes("veri gir")) {
                let rowNum = cmd.replace(/[^0-9]/g, '') || "1";
                const row = document.querySelector(`#table-body tr:nth-child(${rowNum})`);
                if(row) {
                    await speak(rowNum + ". satırı dolduralım. Sırasıyla bilgileri söyle patron.");
                    startRowVoiceInput(row);
                }
                return;
            }

            // 6. Çıkış / Kapatma
            if(cmd.includes("kapat") || cmd.includes("dur") || cmd.includes("iptal")) {
                await speak("Anlaşıldı patron, sistem beklemede.");
                stopAI();
                return;
            }

            // Anlaşılmadıysa
            await speak("Bunu tam anlayamadım patron. Tekrar söyler misin veya butona bas?");
            stopAI();
        }

        function stopAI() {
            isAILending = false;
            document.getElementById('ai-trigger').classList.remove('ai-pulse');
        }

        async function startRowVoiceInput(row) {
            const inputs = row.querySelectorAll('input, select');
            for(let i=0; i < config.columns.length; i++) {
                const col = config.columns[i];
                inputs[i].classList.add('voice-active');
                
                let prompt = col.name;
                if(inputs[i].tagName === 'SELECT') {
                    const opts = Array.from(inputs[i].options).filter(o => o.text !== "");
                    prompt += ". Şu seçeneklerden birini söyle: " + opts.map((o, idx) => (idx+1) + " " + o.text).join(", ");
                }
                
                await speak(prompt);
                playBeep();
                
                let result = await getVoiceInput();
                if(result) {
                    if(inputs[i].tagName === 'SELECT') {
                        const opts = Array.from(inputs[i].options).filter(o => o.text !== "");
                        const index = parseInt(result.replace(/[^0-9]/g, ''));
                        if(index > 0 && index <= opts.length) inputs[i].selectedIndex = opts[index-1].index;
                        else opts.forEach(o => { if(o.text.toLowerCase().includes(result)) inputs[i].selectedIndex = o.index; });
                    } else {
                        inputs[i].value = result;
                    }
                    handleInputChange(inputs[i]);
                }
                inputs[i].classList.remove('voice-active');
            }
            await speak("Satırı başarıyla tamamladık patron. Başka bir emrin var mı?");
            stopAI();
        }

        async function getVoiceInput() {
            return new Promise(resolve => {
                recognition.start();
                recognition.onresult = (e) => resolve(e.results[0][0].transcript.toLowerCase());
                recognition.onerror = () => resolve(null);
            });
        }

        // --- SİSTEM ÇEKİRDEĞİ ---
        window.onload = async () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('tr-TR');
            const snap = await get(ref(db, 'ayarlar/form_duzeni'));
            if(snap.exists()) {
                config = snap.val();
                renderUI();
                await setNextNo();
                loadDraft();
            }
            const recSnap = await get(ref(db, 'receteler'));
            if(recSnap.exists()) { recipes = recSnap.val(); calculateAllMaliyetler(); }
        };

        function renderUI() {
            document.getElementById('dynamic-title').innerText = config.mainTitle;
            const head = document.getElementById('table-head');
            let h = `<tr><th style="width: 12mm; text-align:center">NO</th>`;
            config.columns.forEach(c => { h += `<th style="width:${c.width}%; text-align:${c.align}">${c.name}</th>`; });
            head.innerHTML = h + `</tr>`;
            document.getElementById('table-body').innerHTML = "";
            for(let i=0; i<5; i++) addRow();
        }

        window.addRow = function() {
            const body = document.getElementById('table-body');
            const rowNo = body.rows.length + 1;
            let r = `<tr><td style="text-align:center; font-weight:bold">${rowNo}</td>`;
            config.columns.forEach((c) => {
                r += `<td>`;
                if(c.type === 'select') {
                    r += `<select onchange="handleInputChange(this)" data-col="${c.name}">
                            <option value=""></option>`;
                    c.options.split(',').forEach(o => { r += `<option value="${o.trim()}">${o.trim()}</option>`; });
                    r += `</select>`;
                } else {
                    r += `<input type="${c.type}" oninput="handleInputChange(this)" data-col="${c.name}" class="align-${c.align}" placeholder="...">`;
                }
                r += `</td>`;
            });
            body.insertAdjacentHTML('beforeend', r + `</tr>`);
        }

        window.handleInputChange = function(el) {
            if(el.closest('tr') === document.getElementById('table-body').lastElementChild && el.value !== "") addRow();
            calculateAllMaliyetler();
            saveDraft();
        }

        window.calculateAllMaliyetler = function() {
            const rows = document.querySelectorAll('#table-body tr');
            const rowCostsContainer = document.getElementById('row-costs');
            rowCostsContainer.innerHTML = "";
            let totalGeneral = 0;
            rows.forEach((tr, index) => {
                let rowTotalMaliyet = 0;
                const rowData = {};
                const inputs = tr.querySelectorAll('input, select');
                config.columns.forEach((col, i) => { if(inputs[i]) rowData[col.name] = inputs[i].value; });
                if (!Object.values(rowData).some(v => v !== "")) return;
                
                recipes.forEach(recipe => {
                    if (recipe.kosulGruplari) {
                        recipe.kosulGruplari.forEach(grup => {
                            if (rowData[grup.baslik] == grup.deger || grup.deger === "ANY") {
                                let formulaStr = "";
                                grup.tokens.forEach(t => { formulaStr += (t.type === 'formula' ? (parseFloat(rowData[t.val]) || 0) : t.val); });
                                try {
                                    let miktar = eval(formulaStr) || 0;
                                    if(recipe.birim === "MT") miktar /= 100;
                                    if(recipe.birim === "M2") miktar /= 10000;
                                    rowTotalMaliyet += (miktar * (parseFloat(recipe.birimFiyat) || 0));
                                } catch (e) {}
                            }
                        });
                    }
                });
                if (rowTotalMaliyet > 0) {
                    totalGeneral += rowTotalMaliyet;
                    rowCostsContainer.innerHTML += `<div class="flex justify-between border-b border-slate-800 pb-1"><span>Sıra ${index+1}:</span><span class="font-bold text-red-400">${rowTotalMaliyet.toFixed(2)} TL</span></div>`;
                }
            });
            document.getElementById('total-cost-display').innerText = totalGeneral.toFixed(2) + " TL";
        }

        window.fetchOrder = async function() {
            const noVal = document.getElementById('search-order-no').value;
            if(!noVal) return;
            const no = noVal.padStart(5, '0');
            const snap = await get(ref(db, 'siparisler/' + no));
            if(!snap.exists()) return;
            const data = snap.val();
            isEditMode = true;
            document.getElementById('edit-mode-badge').classList.remove('hidden');
            document.getElementById('form-number').innerText = no;
            document.getElementById('customer-name').value = data.form_bilgileri.musteri_ad || "";
            document.getElementById('customer-phone').value = data.form_bilgileri.musteri_tel || "";
            document.getElementById('grand-total-sale').value = data.form_bilgileri.toplam_satis_fiyati || "0.00";
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            data.siparis_icerigi.forEach(row => {
                addRow();
                const inputs = body.lastElementChild.querySelectorAll('input, select');
                config.columns.forEach((col, i) => { if(row[col.name]) inputs[i].value = row[col.name]; });
            });
            calculateAllMaliyetler();
        }

        window.toggleCostPanel = () => document.getElementById('cost-sidebar').classList.toggle('hidden-panel');

        async function performSave() {
            const no = document.getElementById('form-number').innerText.trim();
            const rows = Array.from(document.querySelectorAll('#table-body tr')).map((tr, index) => {
                const inputs = tr.querySelectorAll('input, select');
                const rowData = {}; let has = false;
                config.columns.forEach((col, i) => { if(inputs[i].value) { has = true; rowData[col.name] = inputs[i].value; } });
                return has ? { satir_no: index + 1, ...rowData } : null;
            }).filter(r => r !== null);
            if(rows.length === 0) return null;
            await set(ref(db, 'siparisler/' + no), {
                form_bilgileri: { form_no: no, tarih: new Date().toLocaleString('tr-TR'), musteri_ad: document.getElementById('customer-name').value, musteri_tel: document.getElementById('customer-phone').value, toplam_maliyet: document.getElementById('total-cost-display').innerText, toplam_satis_fiyati: document.getElementById('grand-total-sale').value },
                siparis_icerigi: rows
            });
            localStorage.removeItem('ada_sineklik_draft');
            return { no };
        }

        window.saveAndDownload = async function() {
            const s = await performSave();
            if(!s) return;
            const opt = { margin: 0, filename: `${s.no}.pdf`, html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(document.getElementById('order-form')).save().then(() => location.reload());
        }

        window.saveAndShareWhatsApp = async function() {
            const s = await performSave();
            if(!s) return;
            const pdf = await html2pdf().set({margin:0, html2canvas:{scale:3}}).from(document.getElementById('order-form')).output('blob');
            const file = new File([pdf], `${s.no}.pdf`, {type:'application/pdf'});
            if(navigator.share) await navigator.share({files:[file]});
        }

        async function setNextNo() {
            const q = query(ref(db, 'siparisler'), orderByKey(), limitToLast(1));
            const s = await get(q);
            let n = 0;
            if(s.exists()) s.forEach(c => n = parseInt(c.key));
            document.getElementById('form-number').innerText = (n + 1).toString().padStart(5, '0');
        }

        window.saveDraft = () => {
            const data = { 
                n: document.getElementById('customer-name').value, 
                t: document.getElementById('customer-phone').value,
                s: document.getElementById('grand-total-sale').value
            };
            localStorage.setItem('ada_draft', JSON.stringify(data));
        };
        
        function loadDraft() {
            const d = JSON.parse(localStorage.getItem('ada_draft'));
            if(d) {
                document.getElementById('customer-name').value = d.n || "";
                document.getElementById('customer-phone').value = d.t || "";
                document.getElementById('grand-total-sale').value = d.s || "";
            }
        }
    </script>
</body>
</html>
