<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik | Akıllı Yönetim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @media print { .no-print { display: none !important; } }
        #order-form { width: 210mm; min-height: 297mm; margin: auto; background: white; padding: 10mm; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; padding: 4px; word-wrap: break-word; }
        input, select { border: none !important; outline: none !important; background: transparent; width: 100%; font-family: inherit; font-size: inherit; }
        .align-left { text-align: left; }
        .align-center { text-align: center; }
        .align-right { text-align: right; }
        #cost-sidebar { position: fixed; right: 20px; top: 100px; width: 280px; z-index: 50; transition: transform 0.3s ease; }
        #cost-sidebar.hidden-panel { transform: translateX(320px); }
        
        /* Asistan Görsel Efektleri */
        .ai-pulse { animation: pulse-red 1.5s infinite; shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .voice-active { background-color: #fee2e2 !important; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-200 p-2 md:p-6 pb-24">

    <div id="cost-sidebar" class="no-print hidden-panel bg-slate-900 text-white p-5 rounded-2xl shadow-2xl border-l-4 border-indigo-500">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-black uppercase text-indigo-400 tracking-widest">💰 MALİYET ANALİZİ</h2>
            <button onclick="toggleCostPanel()" class="text-slate-400 hover:text-white text-xl">×</button>
        </div>
        <div id="row-costs" class="space-y-2 max-h-[400px] overflow-y-auto mb-4 pr-2 text-[11px]"></div>
        <div class="border-t border-slate-700 pt-4">
            <p id="total-cost-display" class="text-3xl font-black text-emerald-400">0.00 TL</p>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-[100] no-print">
        <button id="ai-trigger" onclick="toggleSmartAssistant()" class="bg-red-600 text-white w-20 h-20 rounded-full shadow-2xl flex flex-col items-center justify-center hover:scale-110 transition-all border-4 border-white">
            <i class="fas fa-robot text-2xl mb-1"></i>
            <span class="text-[10px] font-black uppercase">ASİSTAN</span>
        </button>
    </div>

    <div class="max-w-6xl mx-auto space-y-4">
        <div class="flex flex-wrap items-center gap-4 no-print bg-white p-4 rounded-xl shadow-lg border-b-4 border-indigo-600">
            <div class="flex-1 flex gap-2">
                <button onclick="saveAndDownload()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm">PDF</button>
                <button onclick="saveAndShareWhatsApp()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm">WHATSAPP</button>
                <button onclick="addRow()" class="bg-slate-800 text-white px-4 py-2 rounded-lg font-bold text-sm">+ SATIR</button>
                <button onclick="toggleCostPanel()" class="bg-amber-500 text-white px-4 py-2 rounded-lg font-bold text-sm">MALİYET</button>
            </div>
            <div class="flex items-center gap-2">
                <input type="number" id="search-order-no" class="w-20 border p-2 rounded text-sm font-bold" placeholder="No">
                <button onclick="fetchOrder()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm">BUL</button>
            </div>
        </div>

        <div id="order-form" class="shadow-2xl relative">
            <div id="edit-mode-badge" class="hidden no-print absolute -top-2 -left-2 bg-yellow-400 text-black text-[10px] font-black px-4 py-1 rounded-full shadow-md border-2 border-black">DÜZENLEME MODU</div>

            <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-4">
                <div>
                    <h1 id="dynamic-title" class="text-4xl font-black uppercase tracking-tighter text-indigo-900">...</h1>
                    <p class="text-xs font-bold text-slate-500 italic">Tarih: <span id="current-date"></span></p>
                </div>
                <div class="text-right border-l-4 border-red-600 pl-4 flex flex-col items-end">
                    <p id="form-number" class="text-3xl font-mono font-black text-red-600">00000</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black uppercase text-slate-600">Müşteri:</span>
                    <input type="text" id="customer-name" oninput="saveDraft()" class="border-b border-dotted font-bold">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black uppercase text-slate-600">Tel:</span>
                    <input type="text" id="customer-phone" oninput="saveDraft()" class="border-b border-dotted font-bold">
                </div>
            </div>

            <table>
                <thead id="table-head" class="bg-slate-100 font-bold"></thead>
                <tbody id="table-body"></tbody>
            </table>

            <div class="mt-6 flex justify-end">
                <div class="w-1/2 border-2 border-black p-3 rounded-lg flex items-center justify-between">
                    <span class="text-sm font-black uppercase tracking-widest text-red-700">Genel Toplam:</span>
                    <input type="text" id="grand-total-sale" oninput="saveDraft()" class="text-right text-xl font-black text-red-700 w-1/2" placeholder="0.00">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, query, limitToLast, orderByKey } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVUGH6f9XgwY2Izi2PG0mUW_2hoUW_Ywc",
            authDomain: "adasineklik54-4c11c.firebaseapp.com",
            databaseURL: "https://adasineklik54-4c11c-default-rtdb.firebaseio.com",
            projectId: "adasineklik54-4c11c",
            storageBucket: "adasineklik54-4c11c.firebasestorage.app",
            messagingSenderId: "416407042534",
            appId: "1:416407042534:web:8105a2ac5f87477eff7e27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let config = null;
        let recipes = [];
        let isEditMode = false;
        let isAssistantActive = false;

        window.onload = async () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('tr-TR');
            const snap = await get(ref(db, 'ayarlar/form_duzeni'));
            if(snap.exists()) {
                config = snap.val();
                renderUI();
                await setNextNo();
                loadDraft();
            }
            const recSnap = await get(ref(db, 'receteler'));
            if(recSnap.exists()) { recipes = recSnap.val(); calculateAllMaliyetler(); }
        };

        function renderUI() {
            document.getElementById('dynamic-title').innerText = config.mainTitle;
            const head = document.getElementById('table-head');
            let h = `<tr><th style="width: 12mm; text-align:center">NO</th>`;
            config.columns.forEach(c => { h += `<th style="width:${c.width}%; text-align:${c.align}">${c.name}</th>`; });
            head.innerHTML = h + `</tr>`;
            document.getElementById('table-body').innerHTML = "";
            for(let i=0; i<5; i++) addRow();
        }

        window.addRow = function() {
            const body = document.getElementById('table-body');
            const rowNo = body.rows.length + 1;
            let r = `<tr><td style="text-align:center; font-weight:bold">${rowNo}</td>`;
            config.columns.forEach((c) => {
                r += `<td>`;
                if(c.type === 'select') {
                    r += `<select onchange="handleInputChange(this)" data-col="${c.name}">
                            <option value=""></option>`;
                    c.options.split(',').forEach(o => { r += `<option value="${o.trim()}">${o.trim()}</option>`; });
                    r += `</select>`;
                } else {
                    r += `<input type="${c.type}" oninput="handleInputChange(this)" data-col="${c.name}" class="align-${c.align}" placeholder="...">`;
                }
                r += `</td>`;
            });
            body.insertAdjacentHTML('beforeend', r + `</tr>`);
        }

        // --- AKILLI ASİSTAN MOTORU ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if(recognition) {
            recognition.lang = 'tr-TR';
            recognition.continuous = false;
        }

        async function speak(text) {
            return new Promise(resolve => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'tr-TR';
                const voices = window.speechSynthesis.getVoices();
                // Erkek sesi seçmeye çalış
                const male = voices.find(v => v.name.includes('Male') || v.name.includes('Tolga') || v.name.includes('Deniz'));
                if(male) utter.voice = male;
                utter.pitch = 0.8;
                utter.onend = resolve;
                window.speechSynthesis.speak(utter);
            });
        }

        function playBeep() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        window.toggleSmartAssistant = async function() {
            if(isAssistantActive) return;
            isAssistantActive = true;
            const btn = document.getElementById('ai-trigger');
            btn.classList.add('ai-pulse');

            await speak("Buyur patron, ne yapalım? İstersen bir sipariş getireyim, istersen yeni veri girelim.");
            startListening();
        }

        function startListening() {
            playBeep();
            recognition.start();
            
            let silenceTimer = setTimeout(() => {
                recognition.stop();
                handleSilence();
            }, 6000);

            recognition.onresult = async (event) => {
                clearTimeout(silenceTimer);
                const command = event.results[0][0].transcript.toLowerCase();
                await processCommand(command);
            };

            recognition.onerror = () => {
                clearTimeout(silenceTimer);
                handleSilence();
            };
        }

        async function handleSilence() {
            await speak("Patron? Orada mısın? Duymadım, tekrarla istersen.");
            startListening();
        }

        async function processCommand(cmd) {
            console.log("Komut:", cmd);

            // 1. PDF OLUŞTURMA
            if(cmd.includes("pdf") || cmd.includes("kaydet") || cmd.includes("oluştur")) {
                await speak("Hemen PDF hazırlayıp kaydediyorum patron.");
                saveAndDownload();
                return;
            }

            // 2. WHATSAPP
            if(cmd.includes("whatsapp") || cmd.includes("paylaş") || cmd.includes("gönder")) {
                await speak("WhatsApp için hazırlıyorum.");
                saveAndShareWhatsApp();
                return;
            }

            // 3. SİPARİŞ BULMA
            if(cmd.includes("sipariş bul") || cmd.includes("getir") || cmd.includes("nolu")) {
                let num = cmd.replace(/[^0-9]/g, '');
                if(num) {
                    document.getElementById('search-order-no').value = num;
                    await speak(num + " numaralı siparişi getiriyorum.");
                    fetchOrder();
                } else {
                    await speak("Hangi numara patron? Onu söylemedin.");
                    startListening();
                }
                return;
            }

            // 4. VERİ GİRİŞİ (Örnek: "5. satıra veri gir")
            if(cmd.includes("veri gir") || cmd.includes("satır")) {
                let rowIdx = cmd.replace(/[^0-9]/g, '');
                if(rowIdx) {
                    const row = document.querySelector(`#table-body tr:nth-child(${rowIdx})`);
                    if(row) {
                        await speak(rowIdx + ". satır için seni dinliyorum. Sırayla söyle.");
                        startRowAssistant(row);
                    }
                } else {
                    await speak("Hangi satıra yazalım patron?");
                    startListening();
                }
                return;
            }

            // 5. MALİYET GÖR
            if(cmd.includes("maliyet") || cmd.includes("kaç para")) {
                toggleCostPanel();
                const total = document.getElementById('total-cost-display').innerText;
                await speak("Şu anki toplam maliyetimiz tam " + total + ". Bereketli olsun patron, zengin oluyoruz!");
                stopAssistant();
                return;
            }

            // 6. İPTAL / KAPAT
            if(cmd.includes("kapat") || cmd.includes("dur") || cmd.includes("tamam")) {
                await speak("Tamam patron, ben buralardayım. Bir şey lazım olursa butona basarsın.");
                stopAssistant();
                return;
            }

            // ANLAŞILMADI
            await speak("Bunu henüz öğrenemedim patron. Başka bir şey yapalım mı?");
            startListening();
        }

        function stopAssistant() {
            isAssistantActive = false;
            document.getElementById('ai-trigger').classList.remove('ai-pulse');
        }

        // --- SATIR ÖZEL ASİSTANI (Numaralı Seçim Dahil) ---
        async function startRowAssistant(row) {
            const inputs = row.querySelectorAll('input, select');
            for(let i=0; i<config.columns.length; i++) {
                inputs[i].classList.add('voice-active');
                const col = config.columns[i];
                let prompt = col.name;

                if(inputs[i].tagName === 'SELECT') {
                    const opts = Array.from(inputs[i].options).filter(o => o.text !== "");
                    prompt += ". Seçenekler: " + opts.map((o, idx) => (idx+1) + " " + o.text).join(", ");
                }

                await speak(prompt);
                playBeep();
                
                let voiceResult = await getVoiceInput();
                if(voiceResult) {
                    if(inputs[i].tagName === 'SELECT') {
                        const opts = Array.from(inputs[i].options).filter(o => o.text !== "");
                        const num = parseInt(voiceResult.replace(/[^0-9]/g, ''));
                        if(num > 0 && num <= opts.length) {
                            inputs[i].selectedIndex = opts[num-1].index;
                        } else {
                            // Metinle eşleşme
                            opts.forEach(o => { if(o.text.toLowerCase().includes(voiceResult)) inputs[i].selectedIndex = o.index; });
                        }
                    } else {
                        inputs[i].value = voiceResult;
                    }
                    handleInputChange(inputs[i]);
                }
                inputs[i].classList.remove('voice-active');
            }
            
            // Satır sonu esprisi
            if(Math.random() > 0.6) await speak("Ooo, bu sipariş büyükmüş. Kasayı hazırla patron!");
            await speak("Satır bitti. Başka bir emrin var mı?");
            startListening();
        }

        async function getVoiceInput() {
            return new Promise(resolve => {
                recognition.start();
                recognition.onresult = (e) => resolve(e.results[0][0].transcript.toLowerCase());
                recognition.onerror = () => resolve(null);
            });
        }

        // --- DİĞER FONKSİYONLAR ---
        window.handleInputChange = function(el) {
            if(el.closest('tr') === document.getElementById('table-body').lastElementChild && el.value !== "") addRow();
            calculateAllMaliyetler();
            saveDraft();
        }

        window.calculateAllMaliyetler = function() {
            const rows = document.querySelectorAll('#table-body tr');
            const rowCostsContainer = document.getElementById('row-costs');
            rowCostsContainer.innerHTML = "";
            let totalGeneral = 0;
            rows.forEach((tr, index) => {
                let rowTotalMaliyet = 0;
                const rowData = {};
                const inputs = tr.querySelectorAll('input, select');
                config.columns.forEach((col, i) => { if(inputs[i]) rowData[col.name] = inputs[i].value; });
                if (!Object.values(rowData).some(v => v !== "")) return;
                
                recipes.forEach(recipe => {
                    if (recipe.kosulGruplari) {
                        recipe.kosulGruplari.forEach(grup => {
                            const userVal = rowData[grup.baslik];
                            if (userVal == grup.deger || grup.deger === "ANY") {
                                let formulaStr = "";
                                grup.tokens.forEach(t => { formulaStr += (t.type === 'formula' ? (parseFloat(rowData[t.val]) || 0) : t.val); });
                                try {
                                    let miktar = eval(formulaStr) || 0;
                                    if(recipe.birim === "MT") miktar /= 100;
                                    if(recipe.birim === "M2") miktar /= 10000;
                                    rowTotalMaliyet += (miktar * (parseFloat(recipe.birimFiyat) || 0));
                                } catch (e) {}
                            }
                        });
                    }
                });
                if (rowTotalMaliyet > 0) {
                    totalGeneral += rowTotalMaliyet;
                    rowCostsContainer.innerHTML += `<div class="flex justify-between border-b border-slate-800 pb-1"><span>Sıra ${index+1}:</span><span class="font-bold text-indigo-300">${rowTotalMaliyet.toFixed(2)} TL</span></div>`;
                }
            });
            document.getElementById('total-cost-display').innerText = totalGeneral.toFixed(2) + " TL";
        }

        window.fetchOrder = async function() {
            const no = document.getElementById('search-order-no').value.padStart(5, '0');
            const snap = await get(ref(db, 'siparisler/' + no));
            if(!snap.exists()) return;
            const data = snap.val();
            isEditMode = true;
            document.getElementById('edit-mode-badge').classList.remove('hidden');
            document.getElementById('form-number').innerText = no;
            document.getElementById('customer-name').value = data.form_bilgileri.musteri_ad || "";
            document.getElementById('customer-phone').value = data.form_bilgileri.musteri_tel || "";
            document.getElementById('grand-total-sale').value = data.form_bilgileri.toplam_satis_fiyati || "0.00";
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            data.siparis_icerigi.forEach(row => {
                addRow();
                const inputs = body.lastElementChild.querySelectorAll('input, select');
                config.columns.forEach((col, i) => { if(row[col.name]) inputs[i].value = row[col.name]; });
            });
            calculateAllMaliyetler();
        }

        window.toggleCostPanel = () => document.getElementById('cost-sidebar').classList.toggle('hidden-panel');

        async function performSave() {
            const no = document.getElementById('form-number').innerText.trim();
            const rows = Array.from(document.querySelectorAll('#table-body tr')).map((tr, index) => {
                const inputs = tr.querySelectorAll('input, select');
                const rowData = {}; let has = false;
                config.columns.forEach((col, i) => { if(inputs[i].value) { has = true; rowData[col.name] = inputs[i].value; } });
                return has ? { satir_no: index + 1, ...rowData } : null;
            }).filter(r => r !== null);
            if(rows.length === 0) return null;
            await set(ref(db, 'siparisler/' + no), {
                form_bilgileri: { form_no: no, tarih: new Date().toLocaleString('tr-TR'), musteri_ad: document.getElementById('customer-name').value, musteri_tel: document.getElementById('customer-phone').value, toplam_maliyet: document.getElementById('total-cost-display').innerText, toplam_satis_fiyati: document.getElementById('grand-total-sale').value },
                siparis_icerigi: rows
            });
            localStorage.removeItem('ada_sineklik_draft');
            return { no };
        }

        window.saveAndDownload = async function() {
            const s = await performSave();
            if(!s) return;
            const opt = { margin: 0, filename: `${s.no}.pdf`, html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(document.getElementById('order-form')).save().then(() => location.reload());
        }

        window.saveAndShareWhatsApp = async function() {
            const s = await performSave();
            if(!s) return;
            const pdf = await html2pdf().set({margin:0, html2canvas:{scale:3}}).from(document.getElementById('order-form')).output('blob');
            const file = new File([pdf], `${s.no}.pdf`, {type:'application/pdf'});
            if(navigator.share) await navigator.share({files:[file]});
        }

        async function setNextNo() {
            const q = query(ref(db, 'siparisler'), orderByKey(), limitToLast(1));
            const s = await get(q);
            let n = 0;
            if(s.exists()) s.forEach(c => n = parseInt(c.key));
            document.getElementById('form-number').innerText = (n + 1).toString().padStart(5, '0');
        }

        window.saveDraft = function() { /* Form verilerini localStorage'a kaydetme mantığı */ }
        function loadDraft() { /* localStorage'dan veri yükleme mantığı */ }

    </script>
</body>
</html>
