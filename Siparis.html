<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Formu & Canlı Maliyet v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print { .no-print { display: none !important; } }
        #order-form { width: 210mm; min-height: 297mm; margin: auto; background: white; padding: 10mm; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; padding: 4px; word-wrap: break-word; }
        input, select { border: none !important; outline: none !important; background: transparent; width: 100%; font-family: inherit; font-size: inherit; }
        .align-left { text-align: left; }
        .align-center { text-align: center; }
        .align-right { text-align: right; }
        #cost-sidebar { position: fixed; right: 20px; top: 100px; width: 280px; z-index: 50; transition: transform 0.3s ease; }
        #cost-sidebar.hidden-panel { transform: translateX(320px); }
    </style>
</head>
<body class="bg-slate-200 p-2 md:p-6">

    <div id="cost-sidebar" class="no-print hidden-panel bg-slate-900 text-white p-5 rounded-2xl shadow-2xl border-l-4 border-indigo-500">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-black uppercase text-indigo-400 tracking-widest">💰 CANLI MALİYET</h2>
            <button onclick="toggleCostPanel()" class="text-slate-400 hover:text-white text-xl">×</button>
        </div>
        <div id="row-costs" class="space-y-2 max-h-[400px] overflow-y-auto mb-4 pr-2 text-[11px]">
            <p class="text-[10px] text-slate-500 italic">Veri girildiğinde hesaplanacak...</p>
        </div>
        <div class="border-t border-slate-700 pt-4">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Toplam Tahmini Maliyet</p>
            <p id="total-cost-display" class="text-3xl font-black text-emerald-400">0.00 TL</p>
        </div>
    </div>

    <button onclick="toggleCostPanel()" class="no-print fixed right-5 top-5 bg-indigo-600 text-white p-3 rounded-full shadow-2xl z-[60] font-bold hover:scale-110 transition-transform">
        📊 Maliyet Gör
    </button>

    <div class="max-w-6xl mx-auto space-y-4">
        <div class="flex flex-wrap gap-2 no-print bg-white p-4 rounded-xl shadow-lg border-b-4 border-indigo-600">
            <button onclick="saveAndDownload()" class="bg-indigo-600 text-white px-6 py-4 rounded-xl font-black flex-1 shadow-lg hover:bg-indigo-700 transition-all uppercase">KAYDET VE PDF OLUŞTUR</button>
            <button onclick="sendWhatsAppWithPDF()" class="bg-green-600 text-white px-6 py-4 rounded-xl font-black flex-1 shadow-lg hover:bg-green-700 flex items-center justify-center gap-2">
                <span>WHATSAPP GÖNDER (PDF İNDİRİR)</span>
            </button>
            <button onclick="addRow()" class="bg-slate-800 text-white px-6 py-4 rounded-xl font-bold">+ SATIR</button>
        </div>

        <div id="order-form" class="shadow-2xl">
            <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-4">
                <div>
                    <h1 id="dynamic-title" class="text-4xl font-black uppercase tracking-tighter">...</h1>
                    <p class="text-xs font-bold text-slate-500 italic">Tarih: <span id="current-date">--. --. ----</span></p>
                </div>
                <div class="text-right border-l-4 border-red-600 pl-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Form No</p>
                    <p id="form-number" class="text-3xl font-mono font-black text-red-600">00000</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black uppercase text-slate-600">Müşteri:</span>
                    <input type="text" id="customer-name" class="border-b border-dotted border-slate-400 font-bold" placeholder="İsim girin">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black uppercase text-slate-600">Tel:</span>
                    <input type="text" id="customer-phone" class="border-b border-dotted border-slate-400 font-bold" placeholder="05XX">
                </div>
            </div>

            <table>
                <thead id="table-head" class="bg-slate-100 font-bold"></thead>
                <tbody id="table-body"></tbody>
            </table>

            <div class="mt-6 flex justify-end">
                <div class="w-1/2 border-2 border-black p-3 rounded-lg flex items-center justify-between">
                    <span class="text-sm font-black uppercase tracking-widest">Genel Toplam Satış Fiyatı:</span>
                    <div class="flex items-center gap-1 w-1/2">
                        <input type="text" id="grand-total-sale" class="text-right text-xl font-black text-red-700 border-none outline-none" placeholder="0,00">
                        <span class="font-black text-xl text-red-700">TL</span>
                    </div>
                </div>
            </div>

            <div class="mt-12 grid grid-cols-2 gap-10">
                <div class="border-t-2 border-black pt-2 text-center text-[10px] font-black uppercase italic">Teslim Eden</div>
                <div class="border-t-2 border-black pt-2 text-center text-[10px] font-black uppercase italic">Teslim Alan</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, query, limitToLast, orderByKey } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVUGH6f9XgwY2Izi2PG0mUW_2hoUW_Ywc",
            authDomain: "adasineklik54-4c11c.firebaseapp.com",
            databaseURL: "https://adasineklik54-4c11c-default-rtdb.firebaseio.com",
            projectId: "adasineklik54-4c11c",
            storageBucket: "adasineklik54-4c11c.firebasestorage.app",
            messagingSenderId: "416407042534",
            appId: "1:416407042534:web:8105a2ac5f87477eff7e27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let config = null;
        let recipes = [];

        window.onload = async () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('tr-TR');
            
            const snap = await get(ref(db, 'ayarlar/form_duzeni'));
            if(snap.exists()) {
                config = snap.val();
                renderUI();
                await setNextNo();
            }

            const recSnap = await get(ref(db, 'receteler'));
            if(recSnap.exists()) {
                recipes = recSnap.val();
            }
        };

        window.toggleCostPanel = function() {
            const panel = document.getElementById('cost-sidebar');
            panel.classList.toggle('hidden-panel');
        }

        function renderUI() {
            document.getElementById('dynamic-title').innerText = config.mainTitle;
            document.getElementById('dynamic-title').style.color = config.accentColor;
            document.getElementById('order-form').style.fontSize = (config.baseFontSize || 14) + "px";

            const head = document.getElementById('table-head');
            let noWidth = config.noColumnWidth || 12;
            let h = `<tr><th style="width: ${noWidth}mm; text-align:center">NO</th>`;
            config.columns.forEach(c => {
                h += `<th style="width:${c.width}%; text-align:${c.align}; text-transform:uppercase">${c.name}</th>`;
            });
            head.innerHTML = h + `</tr>`;
            
            for(let i=0; i<5; i++) addRow();
        }

        window.addRow = function() {
            const body = document.getElementById('table-body');
            const rowNo = body.rows.length + 1;
            if(rowNo > 35) return;

            let r = `<tr><td style="text-align:center; font-weight:bold">${rowNo}</td>`;
            config.columns.forEach((c) => {
                r += `<td style="text-align:${c.align}">`;
                if(c.type === 'select') {
                    r += `<select onchange="handleInputChange(this)" data-col="${c.name}" class="align-${c.align}">
                            <option value=""></option>`;
                    c.options.split(',').forEach(o => {
                        const v = o.trim();
                        if(v) r += `<option value="${v}">${v}</option>`;
                    });
                    r += `</select>`;
                } else {
                    r += `<input type="${c.type}" oninput="handleInputChange(this)" data-col="${c.name}" class="align-${c.align}" placeholder="...">`;
                }
                r += `</td>`;
            });
            body.insertAdjacentHTML('beforeend', r + `</tr>`);
        }

        window.handleInputChange = function(el) {
            checkAutoRow(el);
            calculateAllMaliyetler();
        }

        function calculateAllMaliyetler() {
            const rows = document.querySelectorAll('#table-body tr');
            const rowCostsContainer = document.getElementById('row-costs');
            rowCostsContainer.innerHTML = "";
            let totalGeneral = 0;

            rows.forEach((tr, index) => {
                let rowTotalMaliyet = 0;
                const rowData = {};
                const inputs = tr.querySelectorAll('input, select');
                
                config.columns.forEach((col, i) => {
                    rowData[col.name] = inputs[i].value;
                });

                if (!Object.values(rowData).some(v => v !== "")) return;

                recipes.forEach(recipe => {
                    if (recipe.kosulGruplari) {
                        recipe.kosulGruplari.forEach(grup => {
                            const userVal = rowData[grup.baslik];
                            const isMatch = (userVal == grup.deger || grup.deger === "ANY");

                            if (isMatch) {
                                let formulaStr = "";
                                grup.tokens.forEach(token => {
                                    if (token.type === 'formula') {
                                        formulaStr += (parseFloat(rowData[token.val]) || 0);
                                    } else {
                                        formulaStr += token.val;
                                    }
                                });

                                try {
                                    let miktar = Function('"use strict"; return (' + formulaStr + ')')() || 0;
                                    if(recipe.birim === "MT") miktar = miktar / 100;
                                    if(recipe.birim === "M2") miktar = miktar / 10000;
                                    const birimFiyat = parseFloat(recipe.birimFiyat) || 0;
                                    rowTotalMaliyet += (miktar * birimFiyat);
                                } catch (e) { console.warn("Hata:", formulaStr); }
                            }
                        });
                    }
                });

                if (rowTotalMaliyet > 0) {
                    totalGeneral += rowTotalMaliyet;
                    rowCostsContainer.innerHTML += `
                        <div class="flex justify-between border-b border-slate-800 pb-1">
                            <span>Sıra ${index+1}:</span>
                            <span class="font-bold text-indigo-300">${rowTotalMaliyet.toFixed(2)} TL</span>
                        </div>
                    `;
                }
            });
            document.getElementById('total-cost-display').innerText = totalGeneral.toFixed(2) + " TL";
        }

        window.checkAutoRow = function(el) {
            const currentRow = el.closest('tr');
            if (currentRow === document.getElementById('table-body').lastElementChild && el.value !== "") {
                addRow();
            }
        }

        async function setNextNo() {
            const q = query(ref(db, 'siparisler'), orderByKey(), limitToLast(1));
            const s = await get(q);
            let n = 0;
            if(s.exists()) s.forEach(c => n = parseInt(c.key));
            document.getElementById('form-number').innerText = (n + 1).toString().padStart(5, '0');
        }

        // --- GÜNCELLENEN WHATSAPP FONKSİYONU ---
        window.sendWhatsAppWithPDF = async function() {
            const phone = document.getElementById('customer-phone').value;
            const no = document.getElementById('form-number').innerText;
            const customerName = document.getElementById('customer-name').value || "Müşteri";
            const totalSale = document.getElementById('grand-total-sale').value || "0.00";

            if(!phone) return alert("Lütfen müşteri numarası girin!");

            // 1. Önce PDF oluştur ve indir
            const opt = { 
                margin: 0, 
                filename: `${no}-${customerName}.pdf`, 
                html2canvas: { scale: 3 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            
            try {
                // PDF indirmeyi başlat
                await html2pdf().set(opt).from(document.getElementById('order-form')).save();

                // 2. WhatsApp'a yönlendir (Kullanıcı indirilen dosyayı ek olarak seçecek)
                const msg = `Merhaba ${customerName}, ${no} nolu siparişiniz oluşturuldu.\nToplam Tutar: ${totalSale} TL.\nSipariş detaylarını içeren PDF telefonunuza indirildi, buradan size iletiyorum.`;
                
                // Kısa bir gecikme ile WhatsApp'ı aç (indirme işlemiyle çakışmaması için)
                setTimeout(() => {
                    const waUrl = `https://wa.me/90${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
                    window.open(waUrl, '_blank');
                }, 1500);

            } catch (err) {
                alert("İşlem sırasında hata oluştu: " + err.message);
            }
        }

        window.saveAndDownload = async function() {
            const no = document.getElementById('form-number').innerText;
            const customerName = document.getElementById('customer-name').value || "İsimsiz";
            const totalMaliyet = document.getElementById('total-cost-display').innerText;
            const totalSale = document.getElementById('grand-total-sale').value || "0.00";
            
            const rows = Array.from(document.querySelectorAll('#table-body tr')).map((tr, index) => {
                const inputs = Array.from(tr.querySelectorAll('input, select'));
                const rowData = {};
                let hasValue = false;
                config.columns.forEach((col, i) => {
                    if(inputs[i].value) {
                        hasValue = true;
                        rowData[col.name] = inputs[i].value;
                    }
                });
                return hasValue ? { satir_no: index + 1, ...rowData } : null;
            }).filter(r => r !== null);

            if (rows.length === 0) return alert("Boş form kaydedilemez!");

            try {
                await set(ref(db, 'siparisler/' + no), {
                    form_bilgileri: {
                        form_no: no,
                        tarih: new Date().toLocaleString('tr-TR'),
                        musteri_ad: customerName,
                        musteri_tel: document.getElementById('customer-phone').value,
                        toplam_maliyet: totalMaliyet,
                        toplam_satis_fiyati: totalSale
                    },
                    siparis_icerigi: rows
                });

                const opt = { 
                    margin: 0, 
                    filename: `${no}-${customerName}.pdf`, 
                    html2canvas: { scale: 3 }, 
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                };
                
                html2pdf().set(opt).from(document.getElementById('order-form')).save().then(() => {
                    alert("Başarıyla Kaydedildi!");
                    location.reload();
                });
            } catch (e) { alert("Hata: " + e.message); }
        }
    </script>
</body>
</html>
